server:
  port: 8090

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**, /api/v1/admin/**
        - id: fine-service
          uri: lb://fine-service
          predicates:
            - Path=/api/v1/fines/**, /api/v1/categories/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
        - id: report-service
          uri: lb://report-service
          predicates:
            - Path=/api/v1/reports/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

